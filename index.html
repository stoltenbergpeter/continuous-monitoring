<!DOCTYPE html>
<!-- Genesys Cloud supervisor auto-monitor app -->
<html lang="en">
  <head>
    <meta name="robots" content="noindex" />
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Genesys Supervisor Auto Monitor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      no-cors
      href="https://cdn.jsdelivr.net/npm/genesys-spark-components@latest/dist/genesys-webcomponents/genesys-webcomponents.min.css"
      rel="stylesheet"
    />
    <script
      no-cors
      type="module"
      src="https://cdn.jsdelivr.net/npm/genesys-spark-components@latest/dist/genesys-webcomponents/genesys-webcomponents.esm.min.js"
    ></script>
    <script id="genesysSdkScript" src="https://sdk-cdn.mypurecloud.com/javascript/latest/purecloud-platform-client-v2.min.js" defer></script>

    <style>
      :root {
        --bg: #f6f8fb;
        --panel: #ffffff;
        --panel-strong: #f8fafc;
        --text: #1f2a37;
        --muted: #667085;
        --border: #d8dee8;
        --line: #e7ebf2;
        --accent: #2563eb;
        --accent-soft: #eff6ff;
        --ok: #057a55;
        --ok-soft: #def7ec;
        --warn: #b45309;
        --warn-soft: #fef3c7;
        --danger: #b91c1c;
        --danger-soft: #fee2e2;
        --shadow: 0 8px 24px rgba(31, 42, 55, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Arial, Helvetica, sans-serif;
        font-size: 13px;
      }

      button,
      input,
      select {
        font: inherit;
      }

      .page {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin: 0 auto;
        max-width: 1680px;
        padding: 12px;
      }

      .topbar {
        align-items: center;
        background: #111827;
        border: 1px solid #1f2937;
        border-radius: 8px;
        color: #ffffff;
        display: grid;
        gap: 12px;
        grid-template-columns: minmax(240px, 1fr) auto;
        padding: 12px 14px;
      }

      .title {
        display: flex;
        flex-direction: column;
        gap: 2px;
        min-width: 0;
      }

      .title h1 {
        font-size: 18px;
        line-height: 1.2;
        margin: 0;
      }
